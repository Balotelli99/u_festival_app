<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 550" width="1200" height="550">
  <defs>
    <!-- Tree gradient -->
    <radialGradient id="treeGrad" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#5cb85c"/>
      <stop offset="100%" stop-color="#3a7a3a"/>
    </radialGradient>
    <radialGradient id="treeDarkGrad" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#4a9e4a"/>
      <stop offset="100%" stop-color="#2d6b2d"/>
    </radialGradient>
    <!-- Water gradient -->
    <linearGradient id="waterGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7ec8e3"/>
      <stop offset="50%" stop-color="#9dd5ec"/>
      <stop offset="100%" stop-color="#7ec8e3"/>
    </linearGradient>
    <!-- Stage marker -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="rgba(0,0,0,0.3)"/>
    </filter>
    <!-- Sand gradient -->
    <linearGradient id="sandGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#e8d5a3"/>
      <stop offset="100%" stop-color="#d4c48c"/>
    </linearGradient>
    <!-- Path gradient -->
    <linearGradient id="pathGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d4c9a0"/>
      <stop offset="100%" stop-color="#c9be96"/>
    </linearGradient>
  </defs>

  <!-- Background (dark green) -->
  <rect width="1200" height="550" fill="#3c7a3c" rx="0"/>
  
  <!-- Main terrain shape (lighter green) -->
  <path d="M 30 30 L 1170 30 L 1170 520 L 30 520 Z" fill="#4a8f4a" rx="10"/>
  
  <!-- Inner green area -->
  <path d="M 50 50 L 1150 50 L 1150 150 Q 1100 170, 1050 160 Q 900 140, 800 170 Q 700 200, 600 180 Q 500 160, 400 190 Q 300 220, 200 200 Q 150 190, 100 200 L 50 200 Z" fill="#5ba05b"/>
  
  <!-- Water / Lake -->
  <path d="M 80 280 Q 120 220, 200 230 Q 300 240, 380 210 Q 420 195, 480 200 Q 550 205, 620 220 Q 700 240, 780 230 Q 850 220, 900 240 Q 950 260, 1000 250 Q 1050 240, 1100 260 L 1140 290 Q 1130 340, 1100 370 Q 1050 410, 980 420 Q 900 430, 800 440 Q 700 450, 600 450 Q 500 445, 400 450 Q 300 455, 200 440 Q 150 430, 120 410 Q 90 380, 70 340 Q 60 310, 80 280 Z" fill="url(#waterGrad)" opacity="0.85"/>
  
  <!-- Water reflection highlights -->
  <path d="M 200 270 Q 300 260, 400 280 Q 500 290, 600 275" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
  <path d="M 400 310 Q 500 300, 600 315 Q 700 325, 800 310" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="1.5"/>
  
  <!-- Sandy beach areas -->
  <path d="M 100 260 Q 200 255, 300 240 Q 350 230, 400 220 Q 420 215, 440 218 L 440 225 Q 420 222, 400 228 Q 350 238, 300 248 Q 200 262, 100 268 Z" fill="url(#sandGrad)" opacity="0.7"/>
  <path d="M 500 430 Q 600 438, 700 440 Q 800 442, 900 435 Q 1000 425, 1060 440 L 1060 450 Q 1000 435, 900 445 Q 800 452, 700 450 Q 600 448, 500 440 Z" fill="url(#sandGrad)" opacity="0.7"/>
  
  <!-- Bottom beach / sand strip -->
  <path d="M 60 440 Q 200 460, 400 470 Q 600 478, 800 475 Q 1000 470, 1150 460 L 1150 510 Q 1000 515, 800 518 Q 600 520, 400 515 Q 200 510, 60 500 Z" fill="#e0d09a" opacity="0.6"/>
  
  <!-- Paths / walkways -->
  <path d="M 200 480 Q 300 440, 400 400 Q 450 380, 500 350 Q 550 320, 600 300 Q 650 280, 700 260 Q 750 240, 800 220 Q 850 200, 900 180 Q 950 165, 1000 160" fill="none" stroke="#c9be96" stroke-width="5" stroke-linecap="round" opacity="0.7"/>
  <path d="M 700 480 Q 720 450, 750 420 Q 780 390, 800 360" fill="none" stroke="#c9be96" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
  <path d="M 400 480 Q 420 440, 450 400 Q 480 360, 520 320" fill="none" stroke="#c9be96" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
  
  <!-- ============ TREES ============ -->
  <!-- Top row trees -->
  <circle cx="80" cy="55" r="18" fill="url(#treeGrad)"/>
  <circle cx="120" cy="48" r="15" fill="url(#treeDarkGrad)"/>
  <circle cx="155" cy="60" r="17" fill="url(#treeGrad)"/>
  <circle cx="200" cy="50" r="14" fill="url(#treeDarkGrad)"/>
  <circle cx="240" cy="55" r="16" fill="url(#treeGrad)"/>
  <circle cx="350" cy="65" r="13" fill="url(#treeDarkGrad)"/>
  <circle cx="390" cy="55" r="15" fill="url(#treeGrad)"/>
  <circle cx="500" cy="50" r="14" fill="url(#treeDarkGrad)"/>
  <circle cx="540" cy="60" r="16" fill="url(#treeGrad)"/>
  <circle cx="680" cy="55" r="13" fill="url(#treeDarkGrad)"/>
  <circle cx="720" cy="48" r="15" fill="url(#treeGrad)"/>
  <circle cx="850" cy="52" r="14" fill="url(#treeDarkGrad)"/>
  <circle cx="890" cy="58" r="16" fill="url(#treeGrad)"/>
  <circle cx="1050" cy="55" r="13" fill="url(#treeDarkGrad)"/>
  <circle cx="1090" cy="48" r="15" fill="url(#treeGrad)"/>
  <circle cx="1130" cy="58" r="14" fill="url(#treeDarkGrad)"/>
  
  <!-- Left side trees -->
  <circle cx="65" cy="100" r="16" fill="url(#treeGrad)"/>
  <circle cx="90" cy="130" r="14" fill="url(#treeDarkGrad)"/>
  <circle cx="70" cy="160" r="17" fill="url(#treeGrad)"/>
  <circle cx="85" cy="195" r="13" fill="url(#treeDarkGrad)"/>
  <circle cx="65" cy="230" r="15" fill="url(#treeGrad)"/>
  
  <!-- Trees around water -->
  <circle cx="130" cy="240" r="14" fill="url(#treeDarkGrad)"/>
  <circle cx="170" cy="225" r="16" fill="url(#treeGrad)"/>
  <circle cx="280" cy="210" r="13" fill="url(#treeDarkGrad)"/>
  <circle cx="330" cy="200" r="15" fill="url(#treeGrad)"/>
  <circle cx="450" cy="195" r="12" fill="url(#treeDarkGrad)"/>
  <circle cx="550" cy="200" r="14" fill="url(#treeGrad)"/>
  <circle cx="650" cy="210" r="13" fill="url(#treeDarkGrad)"/>
  <circle cx="750" cy="215" r="15" fill="url(#treeGrad)"/>
  <circle cx="850" cy="210" r="12" fill="url(#treeDarkGrad)"/>
  <circle cx="950" cy="200" r="14" fill="url(#treeGrad)"/>
  
  <!-- Bottom trees -->
  <circle cx="100" cy="470" r="16" fill="url(#treeGrad)"/>
  <circle cx="180" cy="475" r="13" fill="url(#treeDarkGrad)"/>
  <circle cx="300" cy="480" r="15" fill="url(#treeGrad)"/>
  <circle cx="500" cy="485" r="14" fill="url(#treeDarkGrad)"/>
  <circle cx="600" cy="480" r="12" fill="url(#treeGrad)"/>
  <circle cx="750" cy="482" r="14" fill="url(#treeDarkGrad)"/>
  <circle cx="900" cy="478" r="13" fill="url(#treeGrad)"/>
  <circle cx="1000" cy="475" r="15" fill="url(#treeDarkGrad)"/>
  <circle cx="1100" cy="480" r="14" fill="url(#treeGrad)"/>
  
  <!-- Right side trees -->
  <circle cx="1130" cy="100" r="15" fill="url(#treeGrad)"/>
  <circle cx="1140" cy="140" r="13" fill="url(#treeDarkGrad)"/>
  <circle cx="1125" cy="180" r="16" fill="url(#treeGrad)"/>
  
  <!-- ============ STAGE 1 - Pôton (Main stage, bottom-left on water) ============ -->
  <g id="stage-1">
    <!-- Stage platform -->
    <rect x="140" y="310" width="120" height="90" fill="#c0392b" rx="5" transform="rotate(-10, 200, 355)" filter="url(#shadow)"/>
    <rect x="145" y="315" width="110" height="80" fill="#e74c3c" rx="3" transform="rotate(-10, 200, 355)"/>
    <!-- Stage deck extending into water -->
    <rect x="160" y="390" width="80" height="25" fill="#555" rx="2" transform="rotate(-10, 200, 400)"/>
    <rect x="155" y="410" width="90" height="8" fill="#444" rx="1" transform="rotate(-10, 200, 415)"/>
    <!-- Stage number circle -->
    <circle cx="200" cy="350" r="22" fill="#a93226" stroke="#fff" stroke-width="2" filter="url(#shadow)"/>
    <text x="200" y="357" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="white" text-anchor="middle">1</text>
  </g>
  
  <!-- ============ STAGE 2 - The Lake (center, near water) ============ -->
  <g id="stage-2">
    <!-- Small tent structures -->
    <rect x="490" y="160" width="30" height="25" fill="#8b4513" rx="2" transform="rotate(15, 505, 172)"/>
    <rect x="530" y="155" width="30" height="25" fill="#8b4513" rx="2" transform="rotate(-10, 545, 168)"/>
    <rect x="510" y="140" width="30" height="25" fill="#8b4513" rx="2"/>
    <rect x="480" y="145" width="25" height="20" fill="#a0522d" rx="2" transform="rotate(5, 492, 155)"/>
    <rect x="550" y="145" width="25" height="20" fill="#a0522d" rx="2" transform="rotate(-5, 562, 155)"/>
    <!-- Seating area -->
    <rect x="490" y="185" width="80" height="10" fill="#d4c48c" rx="2"/>
    <rect x="495" y="198" width="70" height="8" fill="#d4c48c" rx="2"/>
    <!-- Stage number circle -->
    <circle cx="530" cy="175" r="22" fill="#a93226" stroke="#fff" stroke-width="2" filter="url(#shadow)"/>
    <text x="530" y="182" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="white" text-anchor="middle">2</text>
  </g>
  
  <!-- ============ STAGE 3 - The Club (right-center) ============ -->
  <g id="stage-3">
    <!-- Building shape -->
    <rect x="730" y="140" width="100" height="70" fill="#e8e8e8" rx="4" filter="url(#shadow)"/>
    <rect x="735" y="145" width="90" height="60" fill="#f5f5f5" rx="3"/>
    <!-- Circular element (like a dance floor) -->
    <circle cx="780" cy="175" r="20" fill="none" stroke="#ccc" stroke-width="2"/>
    <line x1="780" y1="155" x2="780" y2="195" stroke="#ddd" stroke-width="1"/>
    <line x1="760" y1="175" x2="800" y2="175" stroke="#ddd" stroke-width="1"/>
    <!-- Stage number circle -->
    <circle cx="780" cy="165" r="22" fill="#a93226" stroke="#fff" stroke-width="2" filter="url(#shadow)"/>
    <text x="780" y="172" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="white" text-anchor="middle">3</text>
  </g>
  
  <!-- ============ STAGE 4 - Hanggar (top-right) ============ -->
  <g id="stage-4">
    <!-- Hangar building with stripes -->
    <rect x="1020" y="60" width="110" height="90" fill="#e8e8e8" rx="5" filter="url(#shadow)"/>
