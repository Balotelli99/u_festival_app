    <rect x="1030" y="65" width="8" height="80" fill="#c0392b" rx="1"/>
    <rect x="1045" y="65" width="8" height="80" fill="#f5f5f5" rx="1"/>
    <rect x="1060" y="65" width="8" height="80" fill="#c0392b" rx="1"/>
    <rect x="1075" y="65" width="8" height="80" fill="#f5f5f5" rx="1"/>
    <rect x="1090" y="65" width="8" height="80" fill="#c0392b" rx="1"/>
    <rect x="1105" y="65" width="8" height="80" fill="#f5f5f5" rx="1"/>
    <!-- Stage number circle -->
    <circle cx="1075" cy="80" r="22" fill="#a93226" stroke="#fff" stroke-width="2" filter="url(#shadow)"/>
    <text x="1075" y="87" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="white" text-anchor="middle">4</text>
  </g>
  
  <!-- ============ FACILITY ICONS ============ -->
  
  <!-- WC icon (bottom-left) -->
  <g transform="translate(65, 445)">
    <rect x="-14" y="-14" width="28" height="28" fill="#a93226" rx="4" filter="url(#shadow)"/>
    <text x="0" y="5" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white" text-anchor="middle">WC</text>
  </g>
  
  <!-- WC icon (top-center) -->
  <g transform="translate(480, 80)">
    <rect x="-14" y="-14" width="28" height="28" fill="#a93226" rx="4" filter="url(#shadow)"/>
    <text x="0" y="5" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white" text-anchor="middle">WC</text>
  </g>
  
  <!-- WC icon (right side) -->
  <g transform="translate(1140, 160)">
    <rect x="-14" y="-14" width="28" height="28" fill="#a93226" rx="4" filter="url(#shadow)"/>
    <text x="0" y="5" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white" text-anchor="middle">WC</text>
  </g>
  
  <!-- Food/Drink icons (🍹) -->
  <g transform="translate(250, 110)">
    <circle cx="0" cy="0" r="14" fill="#a93226" filter="url(#shadow)"/>
    <text x="0" y="5" font-family="Arial, sans-serif" font-size="12" fill="white" text-anchor="middle">🍹</text>
  </g>
  
  <g transform="translate(460, 120)">
    <circle cx="0" cy="0" r="14" fill="#a93226" filter="url(#shadow)"/>
    <text x="0" y="5" font-family="Arial, sans-serif" font-size="12" fill="white" text-anchor="middle">🍹</text>
  </g>
  
  <g transform="translate(640, 130)">
    <circle cx="0" cy="0" r="14" fill="#a93226" filter="url(#shadow)"/>
    <text x="0" y="5" font-family="Arial, sans-serif" font-size="12" fill="white" text-anchor="middle">🍹</text>
  </g>
  
  <g transform="translate(230, 380)">
    <circle cx="0" cy="0" r="14" fill="#a93226" filter="url(#shadow)"/>
    <text x="0" y="5" font-family="Arial, sans-serif" font-size="12" fill="white" text-anchor="middle">🍹</text>
  </g>
  
  <!-- Drink icons (🍷) -->
  <g transform="translate(380, 100)">
    <circle cx="0" cy="0" r="14" fill="#a93226" filter="url(#shadow)"/>
    <text x="0" y="5" font-family="Arial, sans-serif" font-size="12" fill="white" text-anchor="middle">🍷</text>
  </g>
  
  <g transform="translate(1060, 55)">
    <circle cx="0" cy="0" r="14" fill="#a93226" filter="url(#shadow)"/>
    <text x="0" y="5" font-family="Arial, sans-serif" font-size="12" fill="white" text-anchor="middle">🍷</text>
  </g>
  
  <!-- Locker icons (🔒) -->
  <g transform="translate(280, 440)">
    <circle cx="0" cy="0" r="14" fill="#a93226" filter="url(#shadow)"/>
    <text x="0" y="5" font-family="Arial, sans-serif" font-size="12" fill="white" text-anchor="middle">🔒</text>
  </g>
  
  <g transform="translate(350, 440)">
    <circle cx="0" cy="0" r="14" fill="#a93226" filter="url(#shadow)"/>
    <text x="0" y="5" font-family="Arial, sans-serif" font-size="12" fill="white" text-anchor="middle">🔒</text>
  </g>
  
  <g transform="translate(420, 440)">
    <circle cx="0" cy="0" r="14" fill="#a93226" filter="url(#shadow)"/>
    <text x="0" y="5" font-family="Arial, sans-serif" font-size="12" fill="white" text-anchor="middle">🔒</text>
  </g>
  
  <!-- First Aid (🏥) -->
  <g transform="translate(130, 445)">
    <circle cx="0" cy="0" r="14" fill="#a93226" filter="url(#shadow)"/>
    <text x="0" y="5" font-family="Arial, sans-serif" font-size="12" fill="white" text-anchor="middle">🏥</text>
  </g>
  
  <!-- Info point -->
  <g transform="translate(100, 70)">
    <circle cx="0" cy="0" r="14" fill="#2d6b2d" stroke="#fff" stroke-width="1.5" filter="url(#shadow)"/>
    <text x="0" y="6" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">i</text>
  </g>
  
  <!-- WiFi icon markers -->
  <g transform="translate(310, 130)">
    <circle cx="0" cy="0" r="12" fill="#a93226" filter="url(#shadow)"/>
    <text x="0" y="4" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle">📶</text>
  </g>
  
  <g transform="translate(880, 140)">
    <circle cx="0" cy="0" r="12" fill="#a93226" filter="url(#shadow)"/>
    <text x="0" y="4" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle">📶</text>
  </g>
  
  <!-- ============ ENTRANCE/EXIT ============ -->
  <g transform="translate(920, 490)">
    <rect x="-65" y="-12" width="130" height="24" fill="#a93226" rx="4" filter="url(#shadow)"/>
    <text x="0" y="5" font-family="Arial, sans-serif" font-size="11" font-weight="bold" fill="white" text-anchor="middle">ENTRANCE/EXIT</text>
  </g>
  
  <!-- Small buildings / structures -->
  <!-- Seating / benches near stages -->
  <rect x="575" y="100" width="40" height="15" fill="#4488aa" rx="2" opacity="0.6"/>
  <rect x="620" y="108" width="35" height="12" fill="#4488aa" rx="2" opacity="0.5"/>
  
  <!-- Additional decorative small elements -->
  <rect x="830" y="155" width="20" height="15" fill="#c0392b" rx="2" opacity="0.7"/>
  <rect x="855" y="160" width="15" height="12" fill="#c0392b" rx="2" opacity="0.6"/>
  
  <!-- Middle green islands -->
  <ellipse cx="400" cy="300" rx="25" ry="20" fill="#5ba05b" opacity="0.6"/>
  <ellipse cx="700" cy="350" rx="20" ry="15" fill="#5ba05b" opacity="0.5"/>
  
  <!-- Additional small trees scattered -->
  <circle cx="420" cy="130" r="10" fill="url(#treeGrad)" opacity="0.8"/>
  <circle cx="580" cy="75" r="11" fill="url(#treeDarkGrad)" opacity="0.8"/>
  <circle cx="770" cy="80" r="12" fill="url(#treeGrad)" opacity="0.8"/>
  <circle cx="960" cy="120" r="10" fill="url(#treeDarkGrad)" opacity="0.8"/>
  <circle cx="1000" cy="95" r="11" fill="url(#treeGrad)" opacity="0.8"/>
  
  <!-- Fence / border outline -->
  <path d="M 40 40 L 1160 40 L 1160 510 L 40 510 Z" fill="none" stroke="#2d6b2d" stroke-width="3" stroke-dasharray="8,4" opacity="0.4" rx="10"/>
